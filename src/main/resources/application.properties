spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8020
cors.allowed-origins=http://localhost:5173

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/gemono
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Groq API
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile
groq.vision.model=qwen/qwen3.6-27b
groq.whisper.model=whisper-large-v3-turbo

# Tavily Search API
tavily.api.url=https://api.tavily.com/search
tavily.api.key=${TAVILY_API_KEY}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method

# CORS


# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Rate limiting
rate.limit.max-requests=30
rate.limit.window-seconds=60

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.redis.enabled=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Resend
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
resend.from.name=${RESEND_FROM_NAME:Gemono}
magic.link.expiry.minutes=15
magic.link.base-url=${FRONTEND_URL:http://localhost:5173}

# Email Mock Toggle (true = intercept and log to terminal, false = hit genuine Resend API)
resend.mock.enabled=${RESEND_MOCK_ENABLED:true}