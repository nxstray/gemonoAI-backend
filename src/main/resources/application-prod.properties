spring.application.name=backend

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket=${SUPABASE_BUCKET:gemono-uploads}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# Groq API
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY}
groq.model=llama-3.3-70b-versatile

# Tavily Search API
tavily.api.url=https://api.tavily.com/search
tavily.api.key=${TAVILY_API_KEY}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.enabled=false
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Redis (local Docker: switch to Upstash URL on deploy)
spring.data.redis.host=${UPSTASH_REDIS_HOST}
spring.data.redis.port=${UPSTASH_REDIS_PORT}
spring.data.redis.password=${UPSTASH_REDIS_TOKEN}
spring.data.redis.timeout=2000ms
spring.data.redis.ssl.enabled=true
 
# Rate limiting (requests per window per IP)
rate.limit.max-requests=30
rate.limit.window-seconds=60
 
# Actuator — expose health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=true

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

resend.api.key=${RESEND_API_KEY:dummy}
resend.from.email=${RESEND_FROM_EMAIL:noreply@gemono.app}
resend.from.name=${RESEND_FROM_NAME:Gemono}